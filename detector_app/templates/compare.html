{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Model Comparison - IoMT Security</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="page-compare">
    <nav class="navbar">
        <div class="nav-inner">
            <div class="logo">IoMT Security Admin</div>
            <div class="menu">
                <a href="/admin-dashboard/">Dashboard</a>
                <a href="/upload/">Upload</a>
                <a href="/preprocess/">Preprocess</a>
                <a href="/train/">Train</a>
                <a href="/admin-users/">Manage Users</a>
                <a href="/admin-history/">Detection History</a>
                <a href="/prediction-analysis/">Analysis</a>
                <a href="/admin-logout/">Logout</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <section class="container container--wide">
            <h2>Algorithm Accuracy Comparison</h2>
            <div class="chart-box">
                <canvas id="accuracyChart"></canvas>
            </div>
        </section>
    </main>

    <script>
        const dataObj = {{ data|safe }};
        const labels = Object.keys(dataObj);
        const values = Object.values(dataObj);

        const ctx = document.getElementById("accuracyChart").getContext("2d");
        new Chart(ctx, {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Accuracy",
                    data: values,
                    backgroundColor: "#0b3d91"
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 1
                    }
                }
            }
        });
    </script>
</body>
</html>
