{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Users - IoMT Security</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="page-admin-users">
    <nav class="navbar">
        <div class="nav-inner">
            <div class="logo">IoMT Security Admin</div>
            <div class="menu">
                <a href="/admin-dashboard/">Dashboard</a>
                <a href="/upload/">Upload</a>
                <a href="/preprocess/">Preprocess</a>
                <a href="/train/">Train</a>
                <a href="/compare/">Compare</a>
                <a href="/admin-history/">Detection History</a>
                <a href="/prediction-analysis/">Analysis</a>
                <a href="/admin-logout/">Logout</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <section class="container container--wide">
            <h2>Manage Users</h2>
            <div class="table-wrapper">
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>

                    {% for u in users %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td>{{ u.username }}</td>
                        <td>{{ u.email }}</td>
                        <td>
                            <a class="link-danger" href="/delete-user/{{ u.id }}/">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </section>
    </main>
</body>
</html>
